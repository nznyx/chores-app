name: Chores App CI Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  JDK_VERSION: '24'

jobs:
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java & Gradle
        uses: ./.github/actions/setup-java-gradle
        with:
          java-version: ${{ env.JDK_VERSION }}

      - name: Check Kotlin code style (ktlint)
        run: ./gradlew ktlintCheck --no-daemon

      - name: Run Detekt static analysis
        run: ./gradlew detekt --no-daemon

      - name: Upload Detekt HTML report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: detekt-report
          path: build/reports/detekt/detekt.html
          if-no-files-found: ignore

  test-jvm:
    name: JVM Tests
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java & Gradle
        uses: ./.github/actions/setup-java-gradle
        with:
          java-version: ${{ env.JDK_VERSION }}

      - name: Run all JVM tests
        run: ./gradlew allTests --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: test-reports
          path: '**/build/reports/tests/'
          if-no-files-found: ignore

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java & Gradle
        uses: ./.github/actions/setup-java-gradle
        with:
          java-version: ${{ env.JDK_VERSION }}

      - name: Build Android debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v5
        with:
          name: android-debug-apk
          path: '**/build/outputs/apk/debug/*.apk'
          if-no-files-found: ignore

  build-desktop:
    name: Build Desktop
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java & Gradle
        uses: ./.github/actions/setup-java-gradle
        with:
          java-version: ${{ env.JDK_VERSION }}

      - name: Build Desktop distribution (Deb)
        run: ./gradlew packageDeb --no-daemon

      - name: Upload Desktop distribution
        uses: actions/upload-artifact@v5
        with:
          name: desktop-deb
          path: '**/build/compose/binaries/main/**/*.deb'
          if-no-files-found: ignore

  build-ios:
    name: Build iOS Framework
    runs-on: macos-latest
    needs: code-quality

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java & Gradle
        uses: ./.github/actions/setup-java-gradle
        with:
          java-version: ${{ env.JDK_VERSION }}

      - name: Build iOS framework (Arm64 + Simulator)
        run: ./gradlew linkDebugFrameworkIosArm64 linkDebugFrameworkIosSimulatorArm64 --no-daemon

      - name: Upload iOS frameworks
        uses: actions/upload-artifact@v5
        with:
          name: ios-frameworks
          path: '**/build/bin/ios*/debugFramework/*.framework'
          if-no-files-found: ignore

  ci-success:
    name: CI Passed
    runs-on: ubuntu-latest
    needs: [ code-quality, test-jvm, build-android, build-desktop, build-ios ]
    if: always()

    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.code-quality.result }}"  != "success" ] || \
             [ "${{ needs.test-jvm.result }}"       != "success" ] || \
             [ "${{ needs.build-android.result }}"  != "success" ] || \
             [ "${{ needs.build-desktop.result }}"  != "success" ] || \
             [ "${{ needs.build-ios.result }}"      != "success" ]; then
            echo "One or more jobs failed."
            exit 1
          fi
          echo "All jobs passed successfully!"
